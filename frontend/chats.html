<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CloudTeams - Chats</title>
<link rel="icon" href="assets/favicon/favicon.png">
<style>
/* 🌍 BASE */
body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:linear-gradient(120deg,#f3f6fb,#e9eef5);
 height:100vh;
 overflow:hidden;
}
/* 🧊 GLASS */
.glass{
 background:rgba(255,255,255,0.18);
 backdrop-filter:blur(40px) saturate(180%);
 border:1px solid rgba(255,255,255,0.4);
 box-shadow:
   inset 0 1px 1px rgba(255,255,255,0.6),
   0 20px 40px rgba(0,0,0,0.08);
}
/* 📦 APP */
.app{
 display:flex;
 height:100vh;
}
/* 📂 SIDEBAR */
.sidebar{
 width:320px;
 margin:15px;
 padding:15px;
 border-radius:25px;
 display:flex;
 flex-direction:column;
}
/* 🔍 BUSCADOR */
.search{
 padding:12px;
 border-radius:20px;
 border:none;
 background:rgba(255,255,255,0.3);
 outline:none;
 margin-bottom:15px;
}
/* 📋 RESULTADOS */
.results{
 flex:1;
 overflow-y:auto;
}
/* 👤 ITEM */
.chat-item{
 display:flex;
 gap:10px;
 padding:10px;
 border-radius:15px;
 cursor:pointer;
 transition:.3s;
}
.chat-item:hover{
 background:rgba(255,255,255,0.3);
}
/* 🧑 AVATAR */
.avatar{
 width:40px;
 height:40px;
 border-radius:50%;
 background:#ccc;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:bold;
}
/* 🧠 MAIN */
.main{
 flex:1;
 display:flex;
 flex-direction:column;
}
/* 🔝 HEADER */
.topbar{
 height:70px;
 margin:15px;
 border-radius:25px;
 display:flex;
 align-items:center;
 padding:0 20px;
}
/* 💬 CHAT */
.chat{
 flex:1;
 margin:15px;
 border-radius:25px;
 display:flex;
 flex-direction:column;
 padding:15px;
}
/* 📩 MENSAJES */
.messages{
 flex:1;
 overflow-y:auto;
 display:flex;
 flex-direction:column;
}
/* 💬 BURBUJAS */
.msg{
 max-width:60%;
 padding:10px;
 border-radius:20px;
 margin-bottom:10px;
}
.me{
 margin-left:auto;
 background:linear-gradient(135deg,#4fc3f7,#00bcd4);
 color:white;
}
.other{
 background:rgba(255,255,255,0.6);
}
/* ✏️ INPUT */
.input-area{
 display:flex;
 gap:10px;
}
.input{
 flex:1;
 padding:12px;
 border-radius:20px;
 border:none;
 background:rgba(255,255,255,0.3);
}
/* 🚀 BOTÓN */
.btn{
 width:50px;
 border:none;
 border-radius:50%;
 cursor:pointer;
}
</style>
</head>
<body>
<div class="app">
<!-- 📂 SIDEBAR -->
<div class="sidebar glass">
<input id="search" class="search" placeholder="Buscar usuario...">
<div id="results" class="results"></div>
</div>
<!-- 🧠 MAIN -->
<div class="main">
<div class="topbar glass">
<h3 id="chatTitle">Selecciona un chat</h3>
</div>
<div class="chat glass">
<div id="messages" class="messages"></div>
<div class="input-area">
<input id="msg" class="input" placeholder="Escribe un mensaje...">
<button class="btn glass" onclick="send()">➤</button>
</div>
</div>
</div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
const socket = io("http://localhost:3000");
const user = JSON.parse(localStorage.getItem("user"));
socket.emit("registerUser", user._id);
let currentChat = null;
let currentReceiver = null

// 🔍 BUSCAR USUARIOS
document.getElementById("search").addEventListener("input", async e => {
 const q = e.target.value;
 if(!q) return;
 const res = await fetch(`http://localhost:3000/api/users/search?q=${q}`);
 const data = await res.json();
 const results = document.getElementById("results");
 results.innerHTML = "";
 data.forEach(u => {
   const div = document.createElement("div");
   div.className = "chat-item";
   div.innerHTML = `
<div class="avatar">${u.nombre[0]}</div>
<div>
<strong>${u.nombre}</strong>
<p style="font-size:12px;">${u.correo}</p>
</div>
   `;
   div.onclick = () => openChat(u);
   results.appendChild(div);
 });
});

// 💬 ABRIR CHAT
async function openChat(u){
 document.getElementById("chatTitle").innerText = u.nombre;
 currentReceiver = u._id;
 const res = await fetch("http://localhost:3000/api/chat/private", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     user1:user._id,
     user2:u._id
   })
 });
 const chat = await res.json();
 currentChat = chat._id;
 socket.emit("joinChat", currentChat);
 loadMessages();
}

// 📩 CARGAR MENSAJES
async function loadMessages(){
 const res = await fetch(`http://localhost:3000/api/chat/mensajes/${currentChat}`);
 const data = await res.json();
 const container = document.getElementById("messages");
 container.innerHTML="";
 data.forEach(renderMessage);
}

// ✨ RENDER
function renderMessage(m){
 const div = document.createElement("div");
 div.className = "msg " + (m.senderId === user._id ? "me":"other");
 div.innerText = m.text;
 document.getElementById("messages").appendChild(div);
 const box = document.getElementById("messages");
 box.scrollTop = box.scrollHeight;
}

// ✉️ ENVIAR
window.send = function(){
 const input = document.getElementById("msg");
 if(!input.value || !currentChat) return;
 const msg = {
  chatId: currentChat,
  senderId: user._id,
  receiverId: currentReceiver, 
  text: input.value
};

 socket.emit("sendMessage", msg);
 input.value="";
};

// ⚡ RECIBIR
socket.on("newMessage", msg => {
 if(msg.chatId === currentChat){
   renderMessage(msg);
 }
});
});
</script>
</body>
</html>
