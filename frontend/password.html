<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
<link rel="icon" href="assets/favicon/favicon.png">
<link rel="stylesheet" href="css/styles.css">
<style>
/* 🔥 FIX GLOBAL */
*{
 box-sizing: border-box;
}
/* 🌍 BODY (MISMO FONDO QUE REGISTER) */
body{
 margin:0;
 font-family:-apple-system, sans-serif;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}
/* 🧊 CARD GLASS */
.card{
 width:420px;
 padding:30px;
 border-radius:30px;
 background: rgba(255,255,255,0.2);
 backdrop-filter: blur(40px);
 -webkit-backdrop-filter: blur(40px);
 border:1px solid rgba(255,255,255,0.4);
 box-shadow:
   0 20px 50px rgba(0,0,0,0.1),
   inset 0 1px 1px rgba(255,255,255,0.6);
}
/* 🧠 TITLE */
.title{
 text-align:center;
 font-size:26px;
 font-weight:600;
 margin-bottom:20px;
}
/* ✏️ INPUTS */
.input{
 width:100%;
 padding:14px;
 margin-bottom:12px;
 border:none;
 border-radius:14px;
 background: rgba(255,255,255,0.5);
 outline:none;
 transition:0.3s;
}
/* ✨ EFECTO APPLE */
.input:focus{
 box-shadow:
   0 0 0 2px rgba(0,200,255,0.3),
   0 0 15px rgba(0,200,255,0.2);
}
/* 🔘 BOTÓN */
.btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:14px;
 cursor:pointer;
 background: linear-gradient(135deg,#00d4ff,#00ffa3);
 color:white;
 font-weight:600;
 transition:0.3s;
}
/* ✨ HOVER */
.btn:hover{
 transform: scale(1.03);
}
/* 💥 CLICK */
.btn:active{
 transform: scale(0.95);
 box-shadow:
   0 0 20px rgba(0,255,200,0.6);
}
</style>
</head>
<!-- 🔥 MISMO FONDO QUE REGISTER -->
<body class="auth-page">
<div class="card">
<div class="title">Cambiar contraseña</div>
<input id="actual" type="password" class="input" placeholder="Contraseña actual">
<input id="nueva" type="password" class="input" placeholder="Nueva contraseña">
<input id="confirmar" type="password" class="input" placeholder="Confirmar contraseña">
<button class="btn" onclick="guardar()">Actualizar contraseña</button>
</div>
<script>
/* 🔥 VALIDACIÓN SIMPLE + GUARDADO */
function guardar(){
 const actual = document.getElementById("actual").value;
 const nueva = document.getElementById("nueva").value;
 const confirmar = document.getElementById("confirmar").value;
 const user = JSON.parse(localStorage.getItem("user")) || {};
 if(!actual || !nueva || !confirmar){
   alert("Completa todos los campos");
   return;
 }
 if(user.password && actual !== user.password){
   alert("Contraseña actual incorrecta");
   return;
 }
 if(nueva !== confirmar){
   alert("Las contraseñas no coinciden");
   return;
 }
 /* 🔥 GUARDAR */
 user.password = nueva;
 localStorage.setItem("user", JSON.stringify(user));
 alert("Contraseña actualizada ✅");
 window.location.href = "chat.html";
}
</script>
</body>
</html>
